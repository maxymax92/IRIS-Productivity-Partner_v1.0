<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Iris OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
  }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #0a0a1e;
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(124, 111, 247, 0.15), transparent),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(99, 179, 237, 0.08), transparent),
      radial-gradient(ellipse 50% 50% at 60% 80%, rgba(159, 122, 234, 0.1), transparent);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(10, 10, 30, 0.7) 0%,
      rgba(10, 10, 30, 0.3) 50%,
      rgba(10, 10, 30, 0.15) 100%
    );
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 100px;
  }
  .text {
    flex: 1;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 24px;
  }
  .title {
    font-size: 80px;
    font-weight: 300;
    letter-spacing: -2px;
    color: rgba(255, 255, 255, 0.95);
    line-height: 1;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 24px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.4;
    max-width: 500px;
    margin-bottom: 40px;
  }
  .pill {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    padding: 10px 24px;
  }
  .icon {
    flex-shrink: 0;
    width: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 60px;
  }
  .iris-eye {
    width: 280px;
    height: 280px;
    position: relative;
  }
  .iris-eye .outer {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 3px solid rgba(124, 111, 247, 0.4);
    position: absolute;
  }
  .iris-eye .middle {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px solid rgba(124, 111, 247, 0.25);
    position: absolute;
    top: 40px;
    left: 40px;
  }
  .iris-eye .inner {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 111, 247, 0.5) 0%, rgba(124, 111, 247, 0.15) 70%, transparent 100%);
    position: absolute;
    top: 90px;
    left: 90px;
  }
  .iris-eye .dot {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(124, 111, 247, 0.8);
    position: absolute;
    top: 120px;
    left: 120px;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="text">
      <div class="label">AI Productivity Partner</div>
      <div class="title">IRIS</div>
      <div class="pill">git clone maxymax92/IRIS-Productivity-Partner_v1.0</div>
    </div>
    <div class="icon">
      <div class="iris-eye">
        <div class="outer"></div>
        <div class="middle"></div>
        <div class="inner"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</body>
</html>
