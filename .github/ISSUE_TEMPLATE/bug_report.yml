name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit hash or deployment version (check the app footer or `git rev-parse --short HEAD`).
      placeholder: e.g. 1f32569
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Iris is affected?
      options:
        - Chat
        - Artifacts
        - Memory
        - Agent
        - Auth
        - UI
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, and any relevant version info.
      placeholder: |
        - Browser: Chrome 130
        - OS: macOS 15.3
        - Device: MacBook Pro
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant console output, network errors, or server logs.
      render: shell
    validations:
      required: false
